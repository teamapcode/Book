<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه مورد نظر پیدا نشد - تاریخ جهان</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IRANSans', 'Tahoma', sans-serif;
            background: linear-gradient(145deg, #1a0f0a, #2c1810);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px;
            overflow: hidden;
        }

        .error-page {
            max-width: 550px;
            width: 100%;
            text-align: center;
            padding: 40px 30px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(184, 149, 106, 0.3);
            }
            50% {
                text-shadow: 0 0 40px rgba(184, 149, 106, 0.6), 0 0 80px rgba(184, 149, 106, 0.2);
            }
        }

        @keyframes rotateStar {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.1);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .error-icon {
            font-size: 5.5rem;
            display: block;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 900;
            color: #f5e6d3;
            font-family: 'B Nazanin', 'BTitr', serif;
            line-height: 1;
            margin-bottom: 5px;
            animation: glow 2.5s ease-in-out infinite;
            letter-spacing: 5px;
        }

        .error-code span {
            color: #b8956a;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #dccfc4;
            font-family: 'B Nazanin', 'BTitr', serif;
            margin-bottom: 15px;
        }

        .divider-line {
            width: 80px;
            height: 2px;
            background: #b8956a;
            margin: 0 auto 20px;
            opacity: 0.5;
        }

        .error-text {
            font-size: 1.05rem;
            color: #c4b5a5;
            line-height: 2.2;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .error-text::before {
            content: "❝ ";
            color: #b8956a;
            font-size: 1.3rem;
        }

        .error-text::after {
            content: " ❞";
            color: #b8956a;
            font-size: 1.3rem;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-home {
            display: inline-block;
            padding: 14px 40px;
            background: #b8956a;
            color: #1a0f0a;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            border: 2px solid #b8956a;
        }

        .btn-home:hover {
            background: #d4b08a;
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(184, 149, 106, 0.4);
        }

        .btn-back {
            display: inline-block;
            padding: 14px 35px;
            background: transparent;
            color: #c4b5a5;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            border: 2px solid #4a3228;
        }

        .btn-back:hover {
            background: #3d2c22;
            border-color: #6d4c38;
            transform: scale(1.05);
        }

        /* ستاره‌های تزئینی */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            color: #b8956a;
            font-size: 1.2rem;
            opacity: 0.3;
            animation: rotateStar 8s linear infinite;
        }

        .star:nth-child(1) { top: 10%; left: 5%; font-size: 1.5rem; animation-duration: 10s; opacity: 0.2; }
        .star:nth-child(2) { top: 20%; right: 8%; font-size: 1rem; animation-duration: 7s; opacity: 0.25; }
        .star:nth-child(3) { bottom: 25%; left: 3%; font-size: 1.8rem; animation-duration: 12s; opacity: 0.15; }
        .star:nth-child(4) { bottom: 15%; right: 5%; font-size: 1.3rem; animation-duration: 9s; opacity: 0.2; }
        .star:nth-child(5) { top: 50%; left: 2%; font-size: 0.8rem; animation-duration: 6s; opacity: 0.3; }
        .star:nth-child(6) { top: 40%; right: 3%; font-size: 1.1rem; animation-duration: 11s; opacity: 0.2; }

        .error-page {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.4rem; }
            .error-text { font-size: 0.95rem; line-height: 2; }
            .btn-group { flex-direction: column; align-items: center; }
            .btn-home, .btn-back { width: 80%; text-align: center; }
            .error-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <!-- ستاره‌های تزئینی -->
    <div class="stars">
        <span class="star">✦</span>
        <span class="star">✦</span>
        <span class="star">✦</span>
        <span class="star">✦</span>
        <span class="star">✦</span>
        <span class="star">✦</span>
    </div>

    <div class="error-page">
        <span class="error-icon">📜</span>
        
        <h1 class="error-code">۴<span>۰</span>۴</h1>
        <h2 class="error-title">صفحه‌ای که به دنبال آن هستید، گم شده است</h2>
        
        <div class="divider-line"></div>
        
        <p class="error-text">
            گویی صفحه‌ای که می‌جویید، در میان اوراق تاریخ گم شده است.<br>
            شاید زمان آن رسیده که به آغاز بازگردید.
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn-home">🏠 بازگشت به خانه</a>
            <a href="javascript:history.back()" class="btn-back">↺ بازگشت به صفحه قبل</a>
        </div>
    </div>
</body>
</html>
