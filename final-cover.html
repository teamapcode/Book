<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افق فردا - تاریخ جهان</title>
    
    <!-- آیکون تب مرورگر -->
    <link rel="icon" type="image/jpg" href="favicon.jpg">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IRANSans', 'Tahoma', sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .cover {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #2c1810, #1a0f0a);
            border-radius: 18px;
            padding: 40px 35px 45px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 2px #4a3228 inset;
            text-align: center;
            color: #f5eee7;
        }
        .author-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #b8956a;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 22px;
        }
        .title-fa {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #f5e6d3;
            text-shadow: 0 4px 15px rgba(184, 149, 106, 0.3);
            line-height: 1.4;
            margin-bottom: 8px;
            font-family: 'B Nazanin', 'BTitr', 'IRANSans', serif;
        }
        .title-en {
            font-size: 1rem;
            font-weight: 300;
            color: #c4b5a5;
            letter-spacing: 3px;
            margin-bottom: 18px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
        }
        .divider {
            width: 70px;
            height: 2px;
            background: #b8956a;
            margin: 15px auto;
            opacity: 0.6;
        }
        .description {
            font-size: 1rem;
            line-height: 2.2;
            color: #dccfc4;
            text-align: justify;
            margin: 15px 0 25px;
            padding: 0 5px;
        }
        .meta {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #a09080;
            border-top: 1px solid #3d2c22;
            padding-top: 20px;
        }
        .meta p { margin: 4px 0; }
        .btn-back {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 40px;
            background: #b8956a;
            color: #1a0f0a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 40px;
            font-size: 1rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .btn-back:hover {
            background: #d4b08a;
            transform: scale(1.04);
            box-shadow: 0 8px 25px rgba(184, 149, 106, 0.3);
        }
        @media (max-width: 500px) {
            .cover { padding: 30px 20px 35px; }
            .title-fa { font-size: 1.8rem; }
            .author-img { width: 100px; height: 100px; }
            .description { font-size: 0.9rem; line-height: 2; }
        }
    </style>
</head>
<body>
<div class="cover">
    <!-- همان عکس جلد اول -->
    <img src="your-photo.jpg" alt="عکس اشکان پیمان" class="author-img">

    <h1 class="title-fa">افق فردا</h1>
    <p class="title-en">Horizon of Tomorrow</p>

    <div class="divider"></div>

    <p class="description">
        از اولین گام‌ها بر زمین تا ریشه‌های تمدن، تاریخِ انسان قصه‌ای از نوآوری و دگرگونی است. این اثر، نقاط عطفِ این سفر را کنار هم می‌گذارد تا تصویری روشن از شکل‌گیریِ تمدن و چراییِ تغییرِ دائمیِ آن ارائه دهد.
    </p>

    <div class="meta">
        <p>✦ پایانِ یک سفر ✦</p>
    </div>

    <a href="cover.html" class="btn-back">↺ بازگشت به کتاب</a>
</div>
<script src="favicon.js"></script>
<button id="musicToggle" style="position:fixed; bottom:30px; right:30px; padding:12px 14px; background:#b8956a; color:#1a0f0a; border:3px solid #4a3228; border-radius:50%; cursor:pointer; font-size:1.5rem; z-index:999; box-shadow:0 4px 20px rgba(0,0,0,0.4); transition:0.3s; display:flex; align-items:center; justify-content:center; width:50px; height:50px;">🔊</button>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<style>
    #musicToggle:hover {
        transform: scale(1.2);
        background: #d4b08a;
        border-color: #6d4c38;
        box-shadow: 0 6px 30px rgba(184, 149, 106, 0.6);
    }
</style>

<script>
    const btn = document.getElementById('musicToggle');
    const audio = document.getElementById('bgMusic');
    let isPlaying = false;

    btn.addEventListener('click', function() {
        if (isPlaying) {
            audio.pause();
            btn.innerHTML = '🔇';
            isPlaying = false;
        } else {
            audio.play();
            btn.innerHTML = '🔊';
            isPlaying = true;
        }
    });

    document.addEventListener('click', function() {
        if (!isPlaying) {
            audio.play();
            btn.innerHTML = '🔊';
            isPlaying = true;
        }
    }, { once: true });
</script>
</body>
</html>
